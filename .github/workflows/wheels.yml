name: Build

on: [push, pull_request]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 99
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-latest
            arch: i686
          # Native ARM runner — no QEMU, drastically faster than emulated aarch64
          - os: ubuntu-24.04-arm
            arch: aarch64

          - os: macos-15
            arch: x86_64
          - os: macos-15
            arch: arm64
          # Disabled until someone figures out how to build capnproto for arm64 and x86_64 simultaneously
          # - os: macOS-latest
          #   arch: universal2

          - os: windows-2022
            arch: AMD64
          - os: windows-2022
            arch: x86
          # Does not build currently
          # - os: windows-2019
          #   arch: ARM64

    steps:
      - uses: actions/checkout@v5

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Ensure Conan package dir exists
        run: mkdir -p ~/.conan2/p
        shell: bash

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          output-dir: wheelhouse
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_SKIP: "cp38-*"
          CIBW_TEST_REQUIRES: pytest pytest-asyncio
          CIBW_TEST_COMMAND: pytest {project}
          # Mount the runner's ~/.conan2 directly into the container so packages built
          # inside (m4, capnproto) persist to the host and are cached by actions/cache.
          # --force regenerates the compiler profile for each container image (manylinux vs musllinux).
          CIBW_CONTAINER_ENGINE: "docker; create_args: -v /home/runner/.conan2:/root/.conan2"
          CIBW_BEFORE_ALL_LINUX: "pip install conan && conan profile detect --force && conan install --requires=m4/1.4.19 --build=m4*"

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ matrix.arch }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  # Exotic arches built via QEMU emulation — very slow (often >1h), so only run
  # on release tags rather than every push/PR.
  build_wheels_exotic:
    name: Build wheels (exotic) ${{ matrix.arch }}
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/conan-py-build'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [ppc64le, s390x]
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-exotic-${{ matrix.arch }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-exotic-${{ matrix.arch }}-

      - name: Ensure Conan package dir exists
        run: mkdir -p ~/.conan2/p

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          output-dir: wheelhouse
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_SKIP: "cp38-*"
          CIBW_CONTAINER_ENGINE: "docker; create_args: -v /home/runner/.conan2:/root/.conan2"
          CIBW_BEFORE_ALL_LINUX: "pip install conan && conan profile detect --force && conan install --requires=m4/1.4.19 --build=m4*"
          # Tests under QEMU are extremely slow; skip them for these arches.
          CIBW_TEST_SKIP: "*"

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  lint:
    name: Lint and format with ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint and format with ruff
        run: |
          pip install ruff
          ruff check .
          ruff format --check .

