# Build settings used only by mypy.stubtest. Runtime discrepancies are handled
# separately by the precise entries in allowlist.txt.
[mypy]
# schema_capnp is generated and available only in the capnpc plugin's
# execution environment.
ignore_missing_imports = True

[mypy-capnp.lib.capnp]
# Mypy requires enums in stub files to declare a member, but this Cython enum is
# genuinely memberless at runtime. No placeholder member is added to the stub.
disable_error_code = misc
